<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masai Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
        }

        h2 {
            margin-bottom: 20px;
        }

        .calculator {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button {
            width: 60px;
            height: 60px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #1e293b;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #64748b;
        }

        .clear {
            background-color: #dc2626;
        }

        .clear:hover {
            background-color: #ef4444;
        }

        .equal {
            background-color: #0ea5e9;
        }

        .equal:hover {
            background-color: #38bdf8;
        }
    </style>
</head>
<body>

    <h2>Masai Calculator</h2>

    <div class="calculator">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>×</button>

        <button class="clear">C</button>
        <button>0</button>
        <button class="equal">=</button>
        <button>/</button>
    </div>

</body>
</html>
