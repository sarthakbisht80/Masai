<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <button id="btn"onclick="fetchdata()">Get data</button>
    <div id="container">
  <div id="box"></div>
    </div>
    <script>
 async function fetchdata() {
    let button=document.getElementById('btn');
let data= await fetch('https://fakestoreapi.com/products');
let products= await data.json();

let productbox =document.getElementById('container');
productbox.innerHTML="";

products.forEach(ele=> {
   
    let pid=document.createElement('h2');//id
    let proddata =document.createElement('h4');//description
    let ptitle=document.createElement('h2');//titile
    let proprice=document.createElement('p');//price
    
    pid.innerText=ele.id;
    
    proddata.innerText=ele.description;
    
    ptitle.innerText=ele.title;    
    proprice.innerText=ele.price;
 
    productbox.append(pid,ptitle,proddata,proddata);
    
});
}
    </script>
</body>
</html>
