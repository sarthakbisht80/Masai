<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Layout</title>
    <link rel="stylesheet" a href="style.css">
</head>
<body>
    
    <div class="card">
        <img src="https://nft-card-preview-ten.vercel.app/images/image-equilibrium-edit.jpg" alt="Equilibrium Image" class="card-image">
        <div class="text-content">
            <h2 class="title">Equilibrium #3429</h2>
            <p class="description">Our Equilibrium collection promotes balance and calm.</p>
           <br>
            <div class="info">
                <span class="eth">&#9670; 0.041 ETH</span>
                <span class="days-left">&#128338;3 days left</span>
            </div>
            <hr id =line>
            <div class="creator">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/005/346/410/small_2x/close-up-portrait-of-smiling-handsome-young-caucasian-man-face-looking-at-camera-on-isolated-light-gray-studio-background-photo.jpg" alt="Creator" class="creator-icon"></img>
                <span>Creation of Jules Wyvern</span>
        </div>
    </div>

</body>
</html>
