<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>
  <style>
    body {
      margin: 40px;
    }
    h1 {
      text-align: center;
    }

    .noteArea{
      width: 100%;
      height: 200px;
      padding: 10px;
      font-size: 16px;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      font-size: 15px;
      border: none;
      border-radius: 5px;

    }

    
  </style>
</head>
<body>

  <h1>Notes App</h1>

  <textarea class="noteArea" placeholder="Type your notes here...."></textarea>

  <div class="buttons">
    <button class="save-btn" onclick="saveNotes()">Save Notes</button>
    <button class="load-btn" onclick="loadNotes()">Load Notes</button>
    <button class="clear-btn" onclick="clearNotes()">Clear Notes</button>
  </div>

  <script>
    const noteArea = document.getElementById('noteArea');
    window.onload = loadNotes;

    function saveNotes() {
      const notes = noteArea.value.trim();
      if (notes === "") {
        alert("Note is empty. Please write something before saving.");
        return;
      }
      localStorage.setItem("userNotes", notes);
      alert("Notes saved!");
    }

    function loadNotes() {
      const savedNotes = localStorage.getItem("userNotes");
      if (savedNotes) {
        noteArea.value = savedNotes;
      } else {
        noteArea.value = "";
      }
    }

    function clearNotes() {
      localStorage.removeItem("userNotes");
      noteArea.value = "";
      alert("Notes cleared.");
    }
  </script>

</body>
</html>
