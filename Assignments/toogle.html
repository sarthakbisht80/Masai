<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
body{

  font-family: Arial, Helvetica, sans-serif;
  padding-top: 60px;
  padding-bottom: 50px;
}
    nav {
    position: fixed;
    left: 0;
      top: 0;
      width: 100%;
      padding: 10px ;
    color: antiquewhite;
      display: flex;
      justify-content: space-evenly;
      text-align: center;
      background-color: rgb(50, 104, 198);

    }

    nav button {
      padding: 8px 15px;
      align-content: center;
      font-weight: bold;
      cursor: pointer;

      text-align: center;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      transition: background-color 0.8s;
    }

    button:hover{
      background-color: rgb(105, 145, 215);
    }
    #container {
  
      margin-top: 100px;
      color: rgb(197, 29, 230);
      text-align: left;
      
    }
   
    @media (max-width: 700px) {
      nav {
   
        align-items: flex-start;
        gap: 10px;
      }
      #container {
        font-size: clamp(6px,4vw,20px);
        text-align: left;
}
    }
  </style>
</head>

<body>
  <header>

    <nav>
      <button onclick="fetchdata()">Fetchdata</button>
      <button onclick="filterData()">Filter</button>
      <button onclick="toogle()">Toogletheme</button>
    </nav>

  </header>

  <section>

    <ul id="container">

    </ul>
  </section>


  <footer>

  </footer>


  <script>
    async function fetchdata() {
      let res = await fetch(`https://jsonplaceholder.typicode.com/posts`);
      let data = await res.json();
      console.log(data);
      displaydata(data);
      return data;

    }
    async function displaydata(pData) {
      let outerDiv = document.getElementById('container');
      outerDiv.innerHTML = ""; // clear previous content
    
      let pD = pData.forEach(element => {
        let innerDiv = document.createElement('li');
        innerDiv.className = "paint-data";

        innerDiv.innerHTML = `
      <p>${element.id}</p>
    <h2>${element.title}</h2>
    <p>${element.body}</p>
      `;
        outerDiv.appendChild(innerDiv);

      });

    }

    async function filterData() {

      let Daataa = await fetchdata();//fetching data
      let FilterD = Daataa.filter(el => el.id <= 5);

      displaydata(FilterD);



    }
   


    function toogle(){
     let theme= localStorage.getItem('theme');;
     if(theme ==='dark'){
       localStorage.setItem('theme','light');
       document.body.style.backgroundColor= "white";
     }
     else{
       localStorage.setItem('theme','dark');
       document.body.style.backgroundColor= "black"
     }
   }
  </script>
</body>

</html>
