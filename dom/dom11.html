<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button  onclick="additem()" id="btn" >Add Item</button>
    <ul id="list"> </ul>
    

<script>
      function additem(){
let ulist=document.querySelector("#list");//select the ekemnt which we want to opreate 
let item=document.createElement('li');
  let itemlen= ulist.children.length;
  if(itemlen%2==0){
    item.style.color="Blue";
    item.textContent="EvenItem";
    item.style.fontWeight="Bold";
  }
  else{
    item.style.color="red";
    item.textContent="Odd-Item";
    item.style.fontStyle="Italic";
  }
ulist.appendChild(item);

      }
</script>

</body>
</html>
